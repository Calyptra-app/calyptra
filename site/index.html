<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; font-src 'self'; script-src 'self'; connect-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <link rel="icon" href="./favicon.ico" sizes="32x32">
  <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="96x96" href="./favicon-96x96.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="./android-chrome-512x512.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#071461" />

  <title>Calyptra - The shield that lets them grow</title>
  <meta name="description"
    content="Calyptra is a free, on-device ad and tracker blocker for Android, made for kids' phones. Filtering happens on the phone — no accounts, no analytics, nothing sent to us." />

  <!-- Open Graph / social -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Calyptra - The shield that lets them grow" />
  <meta property="og:description"
    content="Free, on-device ad and tracker blocking for kids' Android phones. Filtering happens on the phone — no accounts, no analytics, nothing sent to us." />
  <meta property="og:image" content="https://calyptra-app.github.io/calyptra/android-chrome-512x512.png" />
  <meta property="og:url" content="https://calyptra-app.github.io/calyptra/" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Calyptra - The shield that lets them grow" />
  <meta name="twitter:description"
    content="Free, on-device ad and tracker blocking for kids' Android phones. Filtering stays on the phone — no accounts, no analytics, nothing sent to us." />
  <meta name="twitter:image" content="https://calyptra-app.github.io/calyptra/android-chrome-512x512.png" />

  <!-- Fonts are self-hosted via @fontsource (imported in src/main.jsx) -->
</head>

<body>
  <!-- Hidden SVG noise filter for the global grain overlay -->
  <svg style="display: none;" aria-hidden="true">
    <filter id="noiseFilter">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="3" stitchTiles="stitch" />
    </filter>
  </svg>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
