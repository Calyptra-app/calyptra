name: Android CI

# Builds the debug APK and runs the unit test suite on every push to main and
# on pull requests that touch the app or its build configuration. Keeps the
# 157 unit tests (DNS parsing, blocklist, SafeSearch, packet assembly) guarding
# every change. Release signing is never exercised here — debug only.
on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradlew'
      - '.github/workflows/android-ci.yml'
  pull_request:
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradlew'
      - '.github/workflows/android-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid PR pushes); let main finish.
concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Gradle 8.7 / AGP 8.4.0 require JDK 17 to run the build (bytecode target is 8).
      - name: Set up JDK 17
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload unit test report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest
          if-no-files-found: ignore
